<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fffaf0" />
    <meta name="description" content="Carnet de recettes familial, synchronisé via pCloud." />
    <title>Carnet repas</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="preconnect" href="https://rsms.me" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="style.css" />
    <script>
      // Applique le thème avant le rendu pour éviter un flash.
      (() => {
        try {
          const t = localStorage.getItem("carnetRepas.theme") || "auto";
          const dark = t === "dark" || (t === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
